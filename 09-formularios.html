<!DOCTYPE html>
<html lang="gl">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Formularios</title>
	<style>
		#contedor{
			width: 60%;
			max-width: 300px;
			margin: auto;
			border: 1px solid grey;
			padding: 15px;
		}
		.campos {
			margin-bottom: 8px;
		}
		label {
			font-size: 0.8rem;
			font-style: italic;
		}
		label.etiqueta {
			display: block;
		}
		#idade {
			width: 50px;
		}
	</style>
</head>
<body>
	<div id="contedor">
		<h1>Formularios</h1>

		<form action="09-formularios.php" method="GET">

			<div class="campos">
				<label class="etiqueta" for="cnome">Nome</label>
				<input id="cnome" type="text" name="nome" maxlength="25" size="10" value="" required>
			</div>
			<!-- o parámetro required obliga a completar ese campo antes do envío -->
			<!-- se poden usar os parámetros disabled é readonly para impedir o uso dun campo -->

			<div class="campos">
				<label class="etiqueta" for="cclave">Clave</label>
				<input id="cclave" type="password" name="clave">
			</div>

			<!-- type hidden é un campo oculto -->
			<input type="hidden" value="r45" name="referencia">

			<div class="campos">
				<label class="etiqueta" for="cidade">Idade</label>
				<input id="cidade" type="number" name="idade" >
			</div>

			<div class="campos">
				<label class="etiqueta">Sexo</label>
				<label for="chome">Home</label>
				<input id="chome" type="radio" name="sexo" value="H">
				<label for="cmuller">Muller</label>
				<input id="cmuller" type="radio" name="sexo" value="M" > 
				<!-- o atributo checked permite marcar por defecto unha opción de radio -->

			</div>	

			<div class="campos">
				<label class="etiqueta">Deportes</label>
				<label for="f">Fútbol</label>
				<input id="f" type="checkbox" value="F" name="dep[]">
				<label for="b">Baloncesto</label>
				<input id="b" type="checkbox" value="B" name="dep[]">
				<label for="t">Ténis</label>
				<input id="t" type="checkbox" value="T" name="dep[]">

				<!-- o atributo checked permite marcar por defecto unha opción de checkbox -->

			<div class="campos">
				<label class="etiqueta" for="cprov">Provincia</label>
				<select name="prov" id="cprov">
					<option value="">- Seleccione -</option>
					<option value="CO">A Coruña</option>
					<option value="LU">Lugo</option>
					<option value="OU">Ourense</option>
					<option value="PO">Pontevedra</option>
				</select>
				<!-- por defecto sempre está seleccionada a primeira opción das option, por iso a primeira non debe ser unha opción de datos seleccionable -->
				<!-- o atributo selected na etiqueta option permite marcar por defecto esa opción da select -->

			</div>


			</div>

			<div class="campos">
				<input type="submit" value="Enviar Datos" >
				<input type="reset" value="Borrar Datos">
			</div>
			<div class="campos">
				<input type="image" src="img/enviar_formulario.png" width="100">
			</div>
			<!-- ou usamos type 'submit' ou type 'image' para enviar o formuilario, non as duas. -->
			<div class="campos">
				<input type="button" value="Botón configurable" onclick="alert('Botón configurable con javascript')">
			</div>

		</form>
	</div>
</body>
</html>
