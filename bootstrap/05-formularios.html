<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Formularios</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-BmbxuPwQa2lc/FVzBcNJ7UAyJxM6wuqIj61tLrc4wSX0szH/Ev+nYRRuWlolflfl" crossorigin="anonymous">	
</head>
<body>
	<div class="container">
		<div class="row">
			<div class="col">
				<h1 class="text-center">Formularios</h1>
			</div>
		</div>
		<form action="">
			<div class="row">
				<div class="col-sm">
					<div class="mb-2">
						<label for="nome" class="form-label">Nome</label>
						<input type="text" class="form-control" id="nome" name="nome">
					</div>
					<div class="mb-2">
						<label for="email" class="form-label">Email</label>
						<input id="email" type="text" class="form-control" name="email">
					</div>
					<div class="mb-2">
						<label for="coment" class="form-label">Comentario</label>
						<textarea name="coment" id="coment" rows="4" class="form-control"></textarea>
					</div>
				</div>
				<div class="col-sm">
					<div class="mb-2">
						<label for="prov" class="form-label">Provincia</label>
						<select name="prov" id="prov" class="form-select">
							<option value="0"></option>
							<option value="CO">A Coruña</option>
							<option value="LU">Lugo</option>
						</select>
					</div>
					<div class="mb-2">
						 <div class="form-check form-check-inline">
						 	<input type="radio" class="form-check-input" name="sexo" id="home" value="H">
						 	<label for="home" class="form-check-label">Home</label>
						 </div>
						 <div class="form-check form-check-inline">
						 	<input type="radio" class="form-check-input" name="sexo" id="muller" value="M">
						 	<label for="muller" class="form-check-label">Muller</label>
						 </div>
					</div>
					<div class="mb-2">
						<div class="form-check form-switch">
							<input type="checkbox" class="form-check-input" id="becario" value="B" name="becario">
							<label for="becario" class="form-check-label">Becario</label>
						</div>
					</div>

				</div>
			</div>
		</form>

	</div>

</body>
</html>
